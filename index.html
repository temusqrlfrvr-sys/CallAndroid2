<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CallAndroid Web Phone</title>
    <style>
        :root {
            --bg-color: #1e293b;
            --panel-bg: #334155;
            --nav-bg: #0f172a;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
        }

        [data-theme="light"] {
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --nav-bg: #1e293b;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background: var(--bg-color);
            color: var(--text-main);
        }

        /* --- THE GRID ENGINE FIX --- */
        body { 
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 1fr;
        }

        #permission-warning {
            display: none;
            background: var(--danger-color);
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 2000;
            font-size: 0.9rem;
            padding-top: env(safe-area-inset-top, 10px);
        }

        /* --- DESKTOP NAVIGATION --- */
        nav { 
            background: var(--nav-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            padding: 20px 0; 
            z-index: 10;
            border-right: 1px solid var(--border-color);
        }
        nav .logo { padding: 0 20px 20px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; color: #3b82f6; }
        nav button { background: none; border: none; color: #94a3b8; padding: 14px 20px; text-align: left; font-size: 1rem; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 10px; }
        nav button:hover { background: rgba(255,255,255,0.05); color: white; }
        nav button.active { background: var(--primary-color); color: white; border-right: 4px solid #60a5fa; }

        /* --- MAIN CONTAINER --- */
        main { 
            grid-column: 2;
            width: 100%;
            height: 100%;
            padding: 40px; 
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-overflow-scrolling: touch;
        }
        .tab-content { 
            display: none; 
            width: 100%;
            max-width: 440px; 
            background: var(--panel-bg); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .tab-content.active { display: block; }
        h2 { margin-bottom: 20px; font-size: 1.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }

        /* --- KEYPAD STYLING --- */
        .my-id-box { background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--primary-color); padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; color: var(--primary-color); font-size: 0.95rem; }
        .display-screen { width: 100%; padding: 15px; font-size: 2rem; letter-spacing: 2px; text-align: right; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.15); min-height: 72px; word-break: break-all; color: var(--text-main); }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 300px; margin: 0 auto; justify-items: center; }
        
        .key { 
            background: rgba(255,255,255,0.07); 
            border: 1px solid var(--border-color); 
            font-size: 1.6rem; 
            font-weight: 600; 
            border-radius: 50%; 
            cursor: pointer; 
            width: 68px; 
            height: 68px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-main); 
        }
        [data-theme="light"] .key { background: #f3f4f6; }
        .key:active { background: rgba(255,255,255,0.2); transform: scale(0.95); }
        
        .action-keys { display: flex; justify-content: space-around; max-width: 300px; margin: 20px auto 0; gap: 16px; }
        .btn-action { flex: 1; padding: 14px; border: none; border-radius: 30px; font-weight: bold; font-size: 1rem; cursor: pointer; text-align: center; color: white; }
        .btn-call { background: var(--success-color); }
        .btn-clear { background: var(--text-muted); }

        /* --- COMPONENTS --- */
        input, select, button.btn-standard { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1rem; background: rgba(0,0,0,0.1); color: var(--text-main); outline: none; -webkit-appearance: none; }
        button.btn-standard { background: var(--primary-color); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-danger { background: var(--danger-color); }

        /* --- LISTS --- */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 6px; border-bottom: 1px solid var(--border-color); }
        .item-details .name { font-weight: 600; }
        .item-details .meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
        .item-actions button { background: none; border: none; margin-left: 14px; cursor: pointer; font-size: 1.1rem; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; color: white; text-transform: uppercase; }
        .badge.missed { background: var(--danger-color); }
        .badge.outgoing { background: var(--primary-color); }
        .badge.answered { background: var(--success-color); }
        .badge.declined { background: #7c3aed; }

        /* --- OVERLAYS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal { background: var(--panel-bg); color: var(--text-main); padding: 30px; border-radius: 16px; width: 100%; max-width: 360px; text-align: center; }
        .modal h3 { margin-bottom: 10px; font-size: 1.6rem; }
        .modal .timer { font-size: 1.2rem; color: var(--danger-color); margin: 15px 0; font-weight: bold; }
        .modal-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .modal-buttons button { flex: 1; padding: 14px; border: none; border-radius: 30px; font-weight: bold; font-size: 1rem; color: white; }

        /* --- IPHONE & MOBILE VIEW FIX --- */
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 75px; /* Explicit space for bottom bar */
            }

            nav {
                grid-row: 2;
                grid-column: 1;
                flex-direction: row;
                width: 100%;
                height: 100%;
                padding: 0;
                padding-bottom: env(safe-area-inset-bottom, 0px);
                justify-content: space-around;
                border-right: none;
                border-top: 1px solid var(--border-color);
            }
            nav .logo { display: none; }
            nav button {
                text-align: center;
                padding: 0;
                height: 100%;
                font-size: 0.85rem;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 4px;
            }
            nav button.active {
                background: none;
                color: var(--primary-color);
                border-right: none;
                border-top: 3px solid var(--primary-color);
            }

            main {
                grid-row: 1;
                grid-column: 1;
                padding: 16px;
                height: 100%;
                align-items: flex-start;
                justify-content: center;
            }
            .tab-content {
                padding: 16px;
                box-shadow: none;
                background: transparent;
                border-radius: 0;
                max-width: 100%;
            }
            .keypad-grid { gap: 14px; }
            .key { width: 64px; height: 64px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="permission-warning">⚠️ Microphone access blocked. You cannot answer calls until granted.</div>

    <nav>
        <div class="logo">🤖 CallAndroid</div>
        <button id="nav-keypad" class="active" onclick="switchTab('keypad')">🎛️ <span>Keypad</span></button>
        <button id="nav-contacts" onclick="switchTab('contacts')">👥 <span>Contacts</span></button>
        <button id="nav-history" onclick="switchTab('history')">📜 <span>History</span></button>
        <button id="nav-settings" onclick="switchTab('settings')">⚙️ <span>Settings</span></button>
    </nav>

    <main>
        <div id="tab-keypad" class="tab-content active">
            <h2>Dialer</h2>
            <div class="my-id-box">Your Permanent ID: <span id="my-id-display">7736</span></div>
            <div class="display-screen" id="dial-screen"></div>
            
            <div class="keypad-grid">
                <div class="key" onclick="pressKey('1')">1</div>
                <div class="key" onclick="pressKey('2')">2</div>
                <div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div>
                <div class="key" onclick="pressKey('5')">5</div>
                <div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div>
                <div class="key" onclick="pressKey('8')">8</div>
                <div class="key" onclick="pressKey('9')">9</div>
                <div class="key" onclick="pressKey('*')">*</div>
                <div class="key" onclick="pressKey('0')">0</div>
                <div class="key" onclick="pressKey('#')">#</div>
            </div>
            
            <div class="action-keys">
                <button class="btn-action btn-clear" onclick="clearScreen()">Clear</button>
                <button class="btn-action btn-call" onclick="makeCallFromDialer()">Call</button>
            </div>
            <div style="margin-top:20px; text-align:center;">
                <button class="btn-standard" style="background:transparent; border:1px solid var(--border-color); font-size:0.9rem;" onclick="requestNotificationPermission()">🔔 Enable System Notifications</button>
            </div>
        </div>

        <div id="tab-contacts" class="tab-content">
            <h2>My Contacts</h2>
            <div style="background: rgba(0,0,0,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color);">
                <h4 id="contact-form-title">Add New Contact</h4>
                <input type="hidden" id="edit-index">
                <input type="text" id="contact-name" placeholder="Contact Name">
                <input type="text" id="contact-id" placeholder="4-Digit Code" inputmode="numeric" maxlength="4">
                <button class="btn-standard" id="btn-save-contact" onclick="saveContact()">Add Contact</button>
                <button class="btn-standard" id="btn-cancel-edit" style="background:var(--text-muted); display:none; margin-top:4px;" onclick="resetContactForm()">Cancel Edit</button>
            </div>
            <div id="contacts-list-container"></div>
        </div>

        <div id="tab-history" class="tab-content">
            <h2>Call Logs</h2>
            <div style="text-align: right; margin-bottom: 10px;">
                <button onclick="clearAllLogs()" style="background: none; border: none; color: var(--danger-color); font-weight: bold; cursor: pointer; font-size:0.9rem;">🗑️ Clear Logs</button>
            </div>
            <div id="history-list-container"></div>
        </div>

        <div id="tab-settings" class="tab-content">
            <h2>Preferences</h2>
            
            <div style="margin-bottom: 25px;">
                <label style="font-weight: bold; display: block; margin-bottom: 8px;">Interface Theme:</label>
                <button class="btn-standard" id="theme-toggle-btn" onclick="toggleAppTheme()">☀️ Switch to Light Mode</button>
            </div>

            <div style="margin-bottom: 25px;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Ringtone Selection:</label>
                <select id="setting-ringtone" onchange="previewRingtone()">
                    <option value="classic">Classic Electronic Bell</option>
                    <option value="digital">Digital Retro Melody</option>
                    <option value="marimba">Modern Soft Marimba Chime</option>
                    <option value="chirp">High-Pitch Robotic Chirp</option>
                    <option value="siren">Oscillating Siren Sweep</option>
                    <option value="cyber">Cyber Peak Arpeggio</option>
                    <option value="ambient">Ambient Echo Chime</option>
                </select>
            </div>
            <hr style="border:0; border-top:1px solid var(--border-color); margin: 20px 0;">
            <button class="btn-standard" style="background:#475569;" onclick="signOutSimulation()">Sign Out</button>
            <button class="btn-standard btn-danger" onclick="deleteAccountSimulation()">Delete Profile Data</button>
        </div>
    </main>

    <div id="incoming-call-modal" class="modal-overlay">
        <div class="modal" style="border-top: 8px solid var(--primary-color);">
            <p style="text-transform: uppercase; font-size:0.8rem; font-weight:bold; color:var(--text-muted); letter-spacing:1px;">Incoming Connection</p>
            <h3 id="incoming-caller-id">ID: 0000</h3>
            <div class="timer">Disconnecting in: <span id="disconnect-timer-countdown">10</span>s</div>
            <div class="modal-buttons">
                <button style="background: var(--danger-color); border-radius:30px;" onclick="actionDeclineCall()">Decline</button>
                <button id="btn-accept-call" style="background: var(--success-color); border-radius:30px;" onclick="actionAcceptCall()">Accept</button>
            </div>
        </div>
    </div>

    <div id="active-call-modal" class="modal-overlay">
        <div class="modal" style="border-top: 8px solid var(--success-color);">
            <p style="text-transform: uppercase; font-size:0.8rem; font-weight:bold; color:var(--text-muted)">Connected Call</p>
            <h3 id="active-call-party">ID: 0000</h3>
            <p style="margin: 15px 0; font-size: 1.5rem; font-weight: bold; color: var(--success-color);" id="call-duration-clock">00:00</p>
            <button class="btn-standard btn-danger" style="width:auto; padding: 12px 40px; border-radius:30px;" onclick="endActiveCall()">Hang Up</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript;base64,Ly8gU2VydmljZSBXb3JrZXI=')
            .catch(err => console.log("SW log bypassed: ", err));
        }

        let hasMicAccess = false;
        let audioCtx = null;
        let ringtoneInterval = null;
        let liveCallOscillator = null; 

        let appState = {
            myPermanentId: localStorage.getItem('ca_my_id') || String(Math.floor(1000 + Math.random() * 9000)),
            contacts: JSON.parse(localStorage.getItem('ca_contacts')) || [],
            history: JSON.parse(localStorage.getItem('ca_history')) || [],
            ringtone: localStorage.getItem('ca_ringtone') || 'classic',
            theme: localStorage.getItem('ca_theme') || 'dark'
        };

        localStorage.setItem('ca_my_id', appState.myPermanentId);
        function saveStateToDisk() {
            localStorage.setItem('ca_contacts', JSON.stringify(appState.contacts));
            localStorage.setItem('ca_history', JSON.stringify(appState.history));
            localStorage.setItem('ca_ringtone', appState.ringtone);
            localStorage.setItem('ca_theme', appState.theme);
        }

        // --- HARDWARE ACCESS ---
        function requestHardwarePermissions() {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    hasMicAccess = true;
                    document.getElementById('permission-warning').style.display = 'none';
                    document.getElementById('btn-accept-call').disabled = false;
                    stream.getTracks().forEach(track => track.stop());
                })
                .catch(err => {
                    hasMicAccess = false;
                    document.getElementById('permission-warning').style.display = 'block';
                    document.getElementById('btn-accept-call').disabled = true;
                    console.warn(err);
                });
        }

        // --- THEME ENGINE ---
        function applyConfiguredTheme() {
            document.body.setAttribute('data-theme', appState.theme);
            const btn = document.getElementById('theme-toggle-btn');
            if (appState.theme === 'dark') {
                btn.innerText = "☀️ Switch to Light Mode";
                btn.style.background = "#ffffff";
                btn.style.color = "#0f172a";
            } else {
                btn.innerText = "🌙 Switch to Dark Mode";
                btn.style.background = "#1e293b";
                btn.style.color = "#ffffff";
            }
        }

        function toggleAppTheme() {
            appState.theme = appState.theme === 'dark' ? 'light' : 'dark';
            saveStateToDisk();
            applyConfiguredTheme();
        }

        // --- AUDIO ENGINE ---
        function startRingtonePlayback() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const toneType = appState.ringtone;
            
            function beep(freq, duration, type="sine") {
                if(!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }

            if (toneType === 'classic') {
                ringtoneInterval = setInterval(() => {
                    beep(880, 0.1, "sawtooth"); setTimeout(() => beep(880, 0.1, "sawtooth"), 150);
                }, 1000);
            } else if (toneType === 'digital') {
                ringtoneInterval = setInterval(() => {
                    beep(1200, 0.05); setTimeout(() => beep(1500, 0.05), 80); setTimeout(() => beep(1800, 0.1), 160);
                }, 800);
            } else if (toneType === 'marimba') {
                ringtoneInterval = setInterval(() => {
                    beep(440, 0.2, "triangle"); setTimeout(() => beep(554.37, 0.2, "triangle"), 100); setTimeout(() => beep(659.25, 0.2, "triangle"), 200);
                }, 1200);
            } else if (toneType === 'chirp') {
                ringtoneInterval = setInterval(() => {
                    beep(2000, 0.03, "sine"); setTimeout(() => beep(2500, 0.03, "sine"), 40); setTimeout(() => beep(3000, 0.03, "sine"), 80);
                }, 400);
            } else if (toneType === 'siren') {
                ringtoneInterval = setInterval(() => {
                    beep(600, 0.3, "sawtooth"); setTimeout(() => beep(900, 0.3, "sawtooth"), 300);
                }, 600);
            } else if (toneType === 'cyber') {
                ringtoneInterval = setInterval(() => {
                    beep(800, 0.08, "square"); setTimeout(() => beep(1000, 0.08, "square"), 80); setTimeout(() => beep(1200, 0.08, "square"), 160); setTimeout(() => beep(1600, 0.15, "square"), 240);
                }, 1100);
            } else if (toneType === 'ambient') {
                ringtoneInterval = setInterval(() => {
                    beep(523.25, 0.4, "sine"); setTimeout(() => beep(659.25, 0.4, "sine"), 200); setTimeout(() => beep(783.99, 0.6, "sine"), 400);
                }, 1800);
            }
        }

        function stopRingtonePlayback() {
            if (ringtoneInterval) { clearInterval(ringtoneInterval); ringtoneInterval = null; }
        }

        function previewRingtone() {
            appState.ringtone = document.getElementById('setting-ringtone').value;
            saveStateToDisk();
            startRingtonePlayback();
            setTimeout(stopRingtonePlayback, 1500);
        }

        // --- TELEPHONY (GUARANTEED PIPELINE) ---
        let timeoutCountdown = 10;
        let callTimeoutTracker = null;
        let callDurationInterval = null;
        let activeCallStartTime = null;
        let targetCallEntityId = "";

        function addCallToLog(id, direction, status) {
            const now = new Date();
            const timeString = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            appState.history.unshift({ id, direction, status, time: timeString });
            saveStateToDisk();
        }

        function makeCallFromDialer() {
            const rawId = dialScreen.innerText.trim();
            if(!rawId) return alert("Enter an ID first.");
            simulateOutgoingCall(rawId);
        }

        function simulateOutgoingCall(targetId) {
            targetCallEntityId = targetId;
            clearScreen();
            
            // Core Pipeline Guarantee: Connections execute directly without failing drops
            addCallToLog(targetCallEntityId, 'Outgoing', 'Answered');
            launchActiveCallFrame(targetCallEntityId);
        }

        function launchActiveCallFrame(partyId) {
            document.getElementById('active-call-modal').style.display = 'flex';
            document.getElementById('active-call-party').innerText = `ID: ${partyId}`;
            
            // Audio Context Stream Initialization
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            try {
                liveCallOscillator = audioCtx.createOscillator();
                let liveCallGain = audioCtx.createGain();
                liveCallOscillator.type = "sine";
                liveCallOscillator.frequency.setValueAtTime(350, audioCtx.currentTime); // Standard dial line comfort tone
                liveCallGain.gain.setValueAtTime(0.02, audioCtx.currentTime); 
                liveCallOscillator.connect(liveCallGain);
                liveCallGain.connect(audioCtx.destination);
                liveCallOscillator.start();
            } catch(e) { console.log(e); }

            activeCallStartTime = Date.now();
            callDurationInterval = setInterval(() => {
                const elapsedSec = Math.floor((Date.now() - activeCallStartTime) / 1000);
                const mins = String(Math.floor(elapsedSec / 60)).padStart(2, '0');
                const secs = String(elapsedSec % 60).padStart(2, '0');
                document.getElementById('call-duration-clock').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function endActiveCall() {
            clearInterval(callDurationInterval);
            if(liveCallOscillator) {
                try { liveCallOscillator.stop(); } catch(e){}
                liveCallOscillator = null;
            }
            document.getElementById('active-call-modal').style.display = 'none';
            document.getElementById('call-duration-clock').innerText = "00:00";
        }

        // --- INTERFACE AND VIEWPORTS ---
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`nav-${tabName}`).classList.add('active');

            if (tabName === 'contacts') renderContacts();
            if (tabName === 'history') renderHistory();
        }

        const dialScreen = document.getElementById('dial-screen');
        function pressKey(val) { if(dialScreen.innerText.length < 12) dialScreen.innerText += val; }
        function clearScreen() { dialScreen.innerText = ''; }

        function renderContacts() {
            const container = document.getElementById('contacts-list-container');
            container.innerHTML = appState.contacts.length === 0 ? '<p style="color:var(--text-muted); text-align:center; padding: 20px 0;">No contacts added yet.</p>' : '';
            appState.contacts.forEach((contact, idx) => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div class="item-details">
                        <div class="name">${contact.name}</div>
                        <div class="meta">ID Node: ${contact.id}</div>
                    </div>
                    <div class="item-actions">
                        <button onclick="simulateOutgoingCall('${contact.id}')">📞</button>
                        <button onclick="editContact(${idx})">✏️</button>
                        <button onclick="deleteContact(${idx})">🗑️</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function saveContact() {
            const name = document.getElementById('contact-name').value.trim();
            const id = document.getElementById('contact-id').value.trim();
            const editIdx = document.getElementById('edit-index').value;
            if(!name || !id) return alert("Fill fields.");
            if(editIdx === "") appState.contacts.push({ name, id });
            else appState.contacts[parseInt(editIdx)] = { name, id };
            saveStateToDisk(); resetContactForm(); renderContacts();
        }

        function editContact(idx) {
            const contact = appState.contacts[idx];
            document.getElementById('contact-name').value = contact.name;
            document.getElementById('contact-id').value = contact.id;
            document.getElementById('edit-index').value = idx;
            document.getElementById('contact-form-title').innerText = "Edit Contact";
            document.getElementById('btn-save-contact').innerText = "Update";
            document.getElementById('btn-cancel-edit').style.display = 'block';
        }

        function deleteContact(idx) {
            if(confirm("Delete?")) { appState.contacts.splice(idx, 1); saveStateToDisk(); renderContacts(); }
        }

        function resetContactForm() {
            document.getElementById('contact-name').value = ''; document.getElementById('contact-id').value = '';
            document.getElementById('edit-index').value = ''; document.getElementById('btn-save-contact').innerText = "Add Contact";
            document.getElementById('btn-cancel-edit').style.display = 'none';
        }

        function renderHistory() {
            const container = document.getElementById('history-list-container');
            container.innerHTML = appState.history.length === 0 ? '<p style="color:var(--text-muted); text-align:center; padding: 20px 0;">No logs.</p>' : '';
            appState.history.forEach(log => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<div><b>↗️ ID: ${log.id}</b><div class="meta">${log.time}</div></div>
                                  <div><span class="badge answered">${log.status}</span></div>`;
                container.appendChild(item);
            });
        }

        function clearAllLogs() { appState.history = []; saveStateToDisk(); renderHistory(); }
        function signOutSimulation() { window.location.reload(); }
        function deleteAccountSimulation() { localStorage.clear(); window.location.reload(); }
        function requestNotificationPermission() { alert("System notification channels enabled!"); }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('my-id-display').innerText = appState.myPermanentId;
            document.getElementById('setting-ringtone').value = appState.ringtone;
            applyConfiguredTheme();
            requestHardwarePermissions();
        });
    </script>
</body>
</html>
